name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-php:
        name: PHP Lint (PHPCS)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Get Composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock', 'plugins/wpappointments/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install root Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install plugin Composer dependencies
              run: composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

            - name: Run PHPCS
              run: ./vendor/bin/phpcs --standard=.phpcs.xml plugins/wpappointments tools

    lint-js:
        name: JS Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate CSS type declarations
              run: pnpm -C plugins/wpappointments css-types

            - name: Lint JS
              run: pnpm lint:js

            - name: Type check
              run: pnpm check-types

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint-js]
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

    test-php:
        name: PHP Tests (Pest)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Create vendor directories
              run: |
                  mkdir -p vendor
                  mkdir -p plugins/wpappointments/vendor

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Install Composer dependencies
              run: |
                  npx wp-env run cli --env-cwd=wp-content composer install
                  npx wp-env run cli --env-cwd=wp-content/plugins/wpappointments composer install

            - name: Fix wp-env file permissions
              run: sudo chown -R $(id -u):$(id -g) ~/wp-env

            - name: Restart wp-env to complete setup
              run: npx wp-env start

            - name: Run Pest tests
              run: npx wp-env run tests-cli --env-cwd=wp-content ./vendor/bin/pest

    e2e:
        name: E2E Tests & Screenshots
        runs-on: ubuntu-latest
        needs: [build]
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Install Composer dependencies (host)
              run: |
                  composer install --no-interaction --prefer-dist
                  composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

            - name: Build plugin assets
              run: pnpm build

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Fix wp-env file permissions
              run: sudo chown -R $(id -u):$(id -g) ~/wp-env

            - name: Restart wp-env
              run: npx wp-env start

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps
              working-directory: plugins/wpappointments

            - name: Run E2E tests
              run: npx playwright test --project=chromium
              working-directory: plugins/wpappointments
              continue-on-error: true

            - name: Publish screenshots and post to PR
              if: always()
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  SCREENSHOT_DIR="tests/e2e/results/screenshots"
                  PR_NUMBER="${{ github.event.number }}"
                  REPO="${{ github.repository }}"
                  BRANCH="screenshots/pr-${PR_NUMBER}"

                  if [ ! -d "$SCREENSHOT_DIR" ]; then
                    echo "No screenshots directory"
                    exit 0
                  fi

                  FILES=$(find "$SCREENSHOT_DIR" -name "*.png" -type f | sort | head -4)

                  if [ -z "$FILES" ]; then
                    echo "No screenshots found"
                    exit 0
                  fi

                  # Push screenshots to a dedicated branch for inline rendering
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git checkout --orphan "$BRANCH"
                  git rm -rf --quiet . 2>/dev/null || true

                  mkdir -p screenshots
                  cp $FILES screenshots/
                  git add screenshots/
                  git commit -m "E2E screenshots for PR #${PR_NUMBER}" --quiet
                  git push origin "$BRANCH" --force --quiet

                  # Build PR comment with inline images
                  MARKER="<!-- e2e-screenshots -->"
                  BODY="${MARKER}"$'\n'"## E2E Screenshots"$'\n\n'

                  for FILE in $FILES; do
                    BASENAME=$(basename "$FILE")
                    NAME=$(echo "$BASENAME" | sed 's/\.png$//' | sed 's/-/ /g' | sed 's/^[0-9]* //')
                    IMG_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/screenshots/${BASENAME}"
                    BODY+="### ${NAME}"$'\n'
                    BODY+="![${NAME}](${IMG_URL})"$'\n\n'
                  done

                  BODY+="<sub>Captured by Playwright E2E • updated on each push</sub>"

                  # Find and update existing comment, or create new one
                  EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
                    --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

                  if [ -n "$EXISTING" ]; then
                    gh api "repos/${REPO}/issues/comments/${EXISTING}" \
                      -X PATCH -f body="$BODY"
                  else
                    gh pr comment "$PR_NUMBER" --body "$BODY"
                  fi

                  # Switch back to the PR branch
                  git checkout -
