name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-php:
    name: PHP Lint (PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock', 'plugins/wpappointments/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install root Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install plugin Composer dependencies
        run: composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=.phpcs.xml plugins/wpappointments tools

  lint-js:
    name: JS Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint JS
        run: pnpm lint:js

      - name: Type check
        run: pnpm check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-js]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test-php:
    name: PHP Tests (Pest)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: xdebug
          extensions: mysqli

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock', 'plugins/wpappointments/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install root Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install plugin Composer dependencies
        run: composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

      - name: Install WordPress test suite
        run: |
          WP_TESTS_DIR=/tmp/wordpress-tests-lib
          WP_CORE_DIR=/tmp/wordpress
          mkdir -p $WP_TESTS_DIR $WP_CORE_DIR /tmp/wp-develop

          WP_VERSION=$(curl -s https://api.wordpress.org/core/version-check/1.7/ | jq -r '.offers[0].version')

          # Download WordPress.
          curl -sL https://wordpress.org/latest.tar.gz | tar xz --strip-components=1 -C $WP_CORE_DIR

          # Download test suite via GitHub mirror (no svn needed).
          curl -sL "https://github.com/WordPress/wordpress-develop/archive/refs/tags/${WP_VERSION}.tar.gz" | tar xz --strip-components=1 -C /tmp/wp-develop
          cp -r /tmp/wp-develop/tests/phpunit/includes $WP_TESTS_DIR/includes
          cp -r /tmp/wp-develop/tests/phpunit/data $WP_TESTS_DIR/data

          # Create wp-tests-config.php.
          cat > $WP_TESTS_DIR/wp-tests-config.php <<'WPCONFIG'
          <?php
          define( 'ABSPATH', '/tmp/wordpress/' );
          define( 'DB_NAME', 'wordpress_test' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', 'root' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );
          $table_prefix = 'wptests_';
          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'Test Blog' );
          define( 'WP_PHP_BINARY', 'php' );
          define( 'WPLANG', '' );
WPCONFIG

      - name: Run Pest tests
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: ./vendor/bin/pest
