name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-php:
        name: PHP Lint (PHPCS)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Get Composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock', 'plugins/wpappointments/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install root Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install plugin Composer dependencies
              run: composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

            - name: Run PHPCS
              run: ./vendor/bin/phpcs --standard=.phpcs.xml plugins/wpappointments tools

    lint-js:
        name: JS Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate CSS type declarations
              run: pnpm -C plugins/wpappointments css-types

            - name: Lint JS
              run: pnpm lint:js

            - name: Type check
              run: pnpm check-types

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint-js]
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

    test-php:
        name: PHP Tests (Pest)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Create vendor directories
              run: |
                  mkdir -p vendor
                  mkdir -p plugins/wpappointments/vendor

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Install Composer dependencies
              run: |
                  npx wp-env run cli --env-cwd=wp-content composer install
                  npx wp-env run cli --env-cwd=wp-content/plugins/wpappointments composer install

            - name: Fix wp-env file permissions
              run: sudo chown -R $(id -u):$(id -g) ~/wp-env

            - name: Restart wp-env to complete setup
              run: npx wp-env start

            - name: Run Pest tests
              run: npx wp-env run tests-cli --env-cwd=wp-content ./vendor/bin/pest

    e2e:
        name: E2E Tests & Screenshots
        runs-on: ubuntu-latest
        needs: [build]
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build plugin assets
              run: pnpm build

            - name: Create vendor directories
              run: |
                  mkdir -p vendor
                  mkdir -p plugins/wpappointments/vendor

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Install Composer dependencies
              run: |
                  npx wp-env run cli --env-cwd=wp-content composer install
                  npx wp-env run cli --env-cwd=wp-content/plugins/wpappointments composer install

            - name: Restart wp-env
              run: npx wp-env start

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run E2E tests
              run: npx playwright test --project=chromium
              working-directory: plugins/wpappointments

            - name: Upload screenshots artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: e2e-screenshots
                  path: tests/e2e/results/screenshots/
                  retention-days: 30
                  if-no-files-found: ignore

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
                  if-no-files-found: ignore

            - name: Post screenshots to PR
              if: always() && github.event_name == 'pull_request'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  SCREENSHOT_DIR="tests/e2e/results/screenshots"

                  if [ ! -d "$SCREENSHOT_DIR" ]; then
                    echo "No screenshots directory"
                    exit 0
                  fi

                  FILES=$(find "$SCREENSHOT_DIR" -name "*.png" -type f | sort | head -4)

                  if [ -z "$FILES" ]; then
                    echo "No screenshots found"
                    exit 0
                  fi

                  RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  MARKER="<!-- e2e-screenshots -->"
                  BODY="${MARKER}"$'\n'"## E2E Screenshots"$'\n\n'

                  for FILE in $FILES; do
                    NAME=$(basename "$FILE" .png | sed 's/-/ /g' | sed 's/^[0-9]* //')
                    BODY+="### ${NAME}"$'\n\n'
                    BODY+='```'$'\n'"Screenshot: $(basename "$FILE")"$'\n''```'$'\n\n'
                  done

                  BODY+=$'\n'"[Download all screenshots from artifacts](${RUN_URL})"$'\n\n'
                  BODY+="<sub>Captured by Playwright E2E</sub>"

                  # Find and update existing comment, or create new one
                  EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
                    --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

                  if [ -n "$EXISTING" ]; then
                    gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
                      -X PATCH -f body="$BODY"
                  else
                    gh pr comment "${{ github.event.number }}" --body "$BODY"
                  fi
