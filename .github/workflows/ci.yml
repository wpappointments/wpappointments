name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-php:
        name: PHP Lint (PHPCS)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Get Composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock', 'plugins/wpappointments/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install root Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install plugin Composer dependencies
              run: composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

            - name: Run PHPCS
              run: ./vendor/bin/phpcs --standard=.phpcs.xml plugins/wpappointments tools

    lint-js:
        name: JS Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate CSS type declarations
              run: pnpm -C plugins/wpappointments css-types

            - name: Lint JS
              run: pnpm lint:js

            - name: Type check
              run: pnpm check-types

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint-js]
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

    test-php:
        name: PHP Tests (Pest)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Create vendor directories
              run: |
                  mkdir -p vendor
                  mkdir -p plugins/wpappointments/vendor

            - name: Install Composer dependencies
              run: |
                  npx wp-env run cli --env-cwd=wp-content composer install
                  npx wp-env run cli --env-cwd=wp-content/plugins/wpappointments composer install

            - name: Activate plugins
              run: npx wp-env run cli wp plugin activate wpappointments other-plugin

            - name: Run Pest tests
              run: npx wp-env run tests-cli --env-cwd=wp-content ./vendor/bin/pest
