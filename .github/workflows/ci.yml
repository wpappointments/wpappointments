name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-php:
        name: PHP Lint (PHPCS)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Get Composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock', 'plugins/wpappointments/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install root Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install plugin Composer dependencies
              run: composer install --no-interaction --prefer-dist --working-dir=plugins/wpappointments

            - name: Run PHPCS
              run: ./vendor/bin/phpcs --standard=.phpcs.xml plugins/wpappointments tools

    lint-js:
        name: JS Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate CSS type declarations
              run: pnpm -C plugins/wpappointments css-types

            - name: Lint JS
              run: pnpm lint:js

            - name: Type check
              run: pnpm check-types

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint-js]
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

    test-php:
        name: PHP Tests (Pest)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Create vendor directories
              run: |
                  mkdir -p vendor
                  mkdir -p plugins/wpappointments/vendor

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Install Composer dependencies
              run: |
                  npx wp-env run cli --env-cwd=wp-content composer install
                  npx wp-env run cli --env-cwd=wp-content/plugins/wpappointments composer install

            - name: Fix wp-env file permissions
              run: sudo chown -R $(id -u):$(id -g) ~/wp-env

            - name: Restart wp-env to complete setup
              run: npx wp-env start

            - name: Run Pest tests
              run: npx wp-env run tests-cli --env-cwd=wp-content ./vendor/bin/pest

    e2e:
        name: E2E Tests & Screenshots
        runs-on: ubuntu-latest
        needs: [build]
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build plugin assets
              run: pnpm build

            - name: Create vendor directories
              run: |
                  mkdir -p vendor
                  mkdir -p plugins/wpappointments/vendor

            - name: Start wp-env
              run: npx wp-env start || true

            - name: Install Composer dependencies
              run: |
                  npx wp-env run cli --env-cwd=wp-content composer install
                  npx wp-env run cli --env-cwd=wp-content/plugins/wpappointments composer install

            - name: Restart wp-env
              run: npx wp-env start

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run E2E tests
              run: npx playwright test --project=chromium
              working-directory: plugins/wpappointments

            - name: Upload screenshots artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: e2e-screenshots
                  path: tests/e2e/results/screenshots/
                  retention-days: 30
                  if-no-files-found: ignore

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
                  if-no-files-found: ignore

            - name: Post screenshots to PR
              if: always() && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const path = require('path');
                      const screenshotDir = 'tests/e2e/results/screenshots';

                      if (!fs.existsSync(screenshotDir)) {
                        console.log('No screenshots directory found');
                        return;
                      }

                      const files = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png'));
                      if (files.length === 0) {
                        console.log('No screenshots found');
                        return;
                      }

                      // Check for existing bot comment
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const marker = '<!-- e2e-screenshots -->';
                      const existing = comments.find(c => c.body && c.body.includes(marker));

                      // Build comment body with screenshot links
                      const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                      let body = `${marker}\n## E2E Screenshots\n\n`;
                      body += `Captured ${files.length} screenshot(s) from the Playwright E2E run.\n\n`;
                      body += `> Download full screenshots from the [e2e-screenshots artifact](${runUrl}).\n\n`;
                      body += '| Screenshot | Preview |\n|---|---|\n';

                      for (const file of files) {
                        const name = file.replace('.png', '').replace(/-/g, ' ');
                        body += `| ${name} | *(see artifact)* |\n`;
                      }

                      body += `\n<sub>Generated by Playwright E2E • Run: ${context.runId}</sub>`;

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
