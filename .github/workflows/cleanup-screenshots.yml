name: Cleanup PR Screenshots

on:
    pull_request:
        types: [closed]

jobs:
    cleanup:
        name: Delete screenshot branch
        runs-on: ubuntu-latest
        steps:
            - name: Delete screenshots/pr-${{ github.event.number }} branch
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  BRANCH="screenshots/pr-${{ github.event.number }}"
                  gh api "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" \
                    -X DELETE 2>/dev/null || echo "Branch ${BRANCH} not found, nothing to clean up"
